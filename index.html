<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VyperCraftMC | Portal Oficial</title>
    <style>
        /* Estilos Generales - Estilo Dark Moderno */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a; /* Fondo casi negro */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Fondo con imagen (Como NauticMC) */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://i.imgur.com/tu-fondo-minecraft.jpg'); /* Pon aquí tu captura de pantalla del server */
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: blur(5px);
        }

        /* Contenedor Principal */
        .container {
            text-align: center;
            padding: 20px;
        }

        /* Logo de VyperCraftMC */
        .logo {
            width: 280px;
            filter: drop-shadow(0 0 15px #00ff00);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Caja de IP */
        .server-ip {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00ff00;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.2rem;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
        }

        /* Botones Estilo Nautic */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }

        .btn {
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #333;
            color: white;
            padding: 15px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            transition: 0.3s;
            display: block;
        }

        .btn:hover {
            border-color: #00ff00;
            background: #00ff00;
            color: black;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
        }

        /* Sección de Rangos (Abajo) */
        .ranks-preview {
            margin-top: 50px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .rank-card {
            background: #151515;
            padding: 15px;
            border-radius: 10px;
            width: 150px;
            border-bottom: 4px solid #00ff00;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <img src="URL_DE_TU_LOGO_AQUI.png" alt="VyperCraftMC Logo" class="logo">

        <div class="server-ip">
            IP: <strong>vypercraft.mcpe.me</strong> 
        </div>

        <div class="menu-buttons">
            <a href="TIENDA_URL" class="btn">Tienda (Rangos)</a>
            <a href="DISCORD_URL" class="btn">Discord Oficial</a>
            <a href="#" class="btn" onclick="alert('IP: vypercraft.mcpe.me - Port: 19132')">Cómo entrar</a>
        </div>

        <div class="ranks-preview">
            <div class="rank-card">
                <h3>VIP</h3>
                <p>$3.00</p>
            </div>
            <div class="rank-card">
                <h3>VIP+</h3>
                <p>$5.00</p>
            </div>
            <div class="rank-card">
                <h3>V.I.P+</h3>
                <p>$10.00</p>
            </div>
        </div>
    </div>

</body>
</html>
